<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FlotaManager — Taller</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0f1117; --card:#1a1d27; --border:#2a2e3e;
    --accent:#f5a623; --red:#e74c3c; --green:#27ae60; --blue:#3498db;
    --text:#eef0f6; --muted:#6b7280;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; max-width:480px; margin:0 auto; }

  #loginScreen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; }
  .logo { font-family:'Bebas Neue',cursive; font-size:44px; color:var(--accent); letter-spacing:4px; }
  .logo-sub { color:var(--muted); font-size:12px; letter-spacing:1px; margin-bottom:40px; }
  .login-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 24px; width:100%; }
  .login-lbl { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; font-weight:600; }
  .pin-dots { display:flex; gap:10px; justify-content:center; margin-bottom:20px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); transition:all 0.15s; }
  .pin-dot.filled { background:var(--accent); border-color:var(--accent); }
  .pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .pk { background:var(--bg); border:1px solid var(--border); border-radius:14px; height:60px; font-size:22px; font-weight:700; color:var(--text); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .pk:active { background:rgba(245,166,35,.15); border-color:var(--accent); transform:scale(.95); }
  .pk.empty { background:transparent; border:none; cursor:default; }
  .pk.del { font-size:18px; color:var(--muted); }
  .pin-err { color:var(--red); font-size:13px; text-align:center; margin-top:10px; display:none; }

  #appScreen { display:none; padding-bottom:20px; }
  .top-bar { background:var(--card); border-bottom:2px solid var(--accent); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
  .top-name { font-weight:700; font-size:15px; }
  .top-sub { font-size:11px; color:var(--accent); font-weight:600; }
  .top-logo { font-family:'Bebas Neue',cursive; font-size:20px; color:var(--accent); }
  .logout-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; }

  .section-pad { padding:0 16px; }
  .sec-title { font-family:'Bebas Neue',cursive; font-size:28px; letter-spacing:1px; margin:20px 0 14px; }

  .unit-selector { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .unit-btn { background:var(--card); border:2px solid var(--border); border-radius:14px; padding:16px 18px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all 0.2s; text-align:left; width:100%; }
  .unit-btn:active,.unit-btn.selected { border-color:var(--accent); background:rgba(245,166,35,.06); }
  .unit-icon { font-size:28px; }
  .unit-name { font-weight:700; font-size:15px; }
  .unit-plates { font-size:12px; color:var(--accent); letter-spacing:2px; }
  .unit-km { font-size:11px; color:var(--muted); }

  .hist-card { background:var(--card); border:1px solid var(--border); border-left:3px solid var(--blue); border-radius:0 12px 12px 0; padding:14px 16px; margin-bottom:10px; }
  .hist-title { font-size:14px; font-weight:600; }
  .hist-meta { font-size:12px; color:var(--muted); margin-top:3px; }
  .hist-items { margin-top:8px; display:flex; flex-direction:column; gap:4px; }
  .hist-item { font-size:13px; color:var(--text); display:flex; align-items:center; gap:6px; }

  .sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100; align-items:flex-end; justify-content:center; }
  .sheet-overlay.open { display:flex; }
  .sheet { background:var(--card); border-radius:24px 24px 0 0; padding:24px 20px 40px; width:100%; max-width:480px; max-height:92vh; overflow-y:auto; animation:slideUp .3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:none} }
  .sheet-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .sheet-title { font-family:'Bebas Neue',cursive; font-size:28px; letter-spacing:1px; margin-bottom:20px; }

  label { display:block; font-size:12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  input,select,textarea { width:100%; background:var(--bg); border:1.5px solid var(--border); color:var(--text); padding:13px 14px; border-radius:12px; font-family:'Inter',sans-serif; font-size:15px; margin-bottom:16px; transition:border-color .2s; }
  input:focus,select:focus,textarea:focus { outline:none; border-color:var(--accent); }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .partes-list { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .parte-row { display:flex; gap:8px; align-items:center; }
  .parte-row input { margin:0; flex:1; }
  .rm-btn { background:rgba(231,76,60,.15); border:1px solid rgba(231,76,60,.3); color:var(--red); border-radius:8px; padding:10px 14px; cursor:pointer; font-size:16px; flex-shrink:0; }
  .add-parte-btn { background:rgba(52,152,219,.1); border:1px dashed rgba(52,152,219,.4); color:var(--blue); border-radius:10px; padding:12px; font-size:13px; font-weight:600; cursor:pointer; width:100%; margin-bottom:16px; text-align:center; }

  .total-preview { background:rgba(245,166,35,.08); border:1px solid rgba(245,166,35,.3); border-radius:10px; padding:14px; margin-bottom:16px; font-family:'Bebas Neue',cursive; font-size:22px; color:var(--accent); letter-spacing:1px; }

  .btn-submit { width:100%; background:var(--accent); color:#000; border:none; padding:16px; border-radius:14px; font-size:16px; font-weight:700; cursor:pointer; transition:all .2s; }
  .btn-submit:active { transform:scale(.98); }
  .btn-submit:disabled { opacity:.5; }
  .btn-cancel { width:100%; background:transparent; color:var(--muted); border:1px solid var(--border); padding:14px; border-radius:14px; font-size:15px; font-weight:600; cursor:pointer; margin-top:10px; }

  .chip { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:700; }
  .chip-g { background:rgba(39,174,96,.15); color:var(--green); }
  .chip-r { background:rgba(231,76,60,.15); color:var(--red); }
  .chip-a { background:rgba(245,166,35,.15); color:var(--accent); }
  .chip-b { background:rgba(52,152,219,.15); color:var(--blue); }

  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:40px auto; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .empty { text-align:center; padding:32px 16px; color:var(--muted); font-size:14px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--border); border-left:4px solid var(--green); border-radius:12px; padding:12px 20px; font-size:14px; z-index:200; white-space:nowrap; max-width:90vw; animation:fadeUp .3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

  .svc-section { background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:14px; overflow:hidden; }
  .svc-header { background:rgba(231,76,60,.08); border-bottom:1px solid var(--border); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; }
  .svc-body { padding:14px 16px; }

  .action-btn { background:var(--accent); color:#000; border:none; padding:14px; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; width:100%; margin-bottom:10px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo">FLOTA</div>
  <div class="logo-sub">MANAGER PRO · TALLER YNURRIGARRO</div>
  <div class="login-card">
    <div class="login-lbl">Ingresa tu PIN</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-pad">
      <button class="pk" onclick="p('1')">1</button>
      <button class="pk" onclick="p('2')">2</button>
      <button class="pk" onclick="p('3')">3</button>
      <button class="pk" onclick="p('4')">4</button>
      <button class="pk" onclick="p('5')">5</button>
      <button class="pk" onclick="p('6')">6</button>
      <button class="pk" onclick="p('7')">7</button>
      <button class="pk" onclick="p('8')">8</button>
      <button class="pk" onclick="p('9')">9</button>
      <button class="pk empty"></button>
      <button class="pk" onclick="p('0')">0</button>
      <button class="pk del" onclick="p('del')">⌫</button>
    </div>
    <div class="pin-err" id="pinErr">PIN incorrecto</div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="top-bar">
    <div>
      <div class="top-name">Taller Ynurrigarro</div>
      <div class="top-sub">ACCESO MECÁNICO</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="top-logo">FM</div>
      <button class="logout-btn" onclick="location.reload()">Salir</button>
    </div>
  </div>

  <div class="section-pad">
    <div class="sec-title">Selecciona Unidad</div>
    <div class="unit-selector" id="unitSelector"><div class="spinner"></div></div>

    <div id="unitDetail" style="display:none">
      <div class="action-btn" onclick="openSheet('sheetTrabajo')" style="background:var(--accent)">🔧 Registrar Trabajo Realizado</div>

      <div class="sec-title">Historial de la Unidad</div>
      <div id="unitHistory"><div class="spinner"></div></div>

      <div class="sec-title" style="margin-top:20px">Daños Reportados</div>
      <div id="unitDanos"><div class="spinner"></div></div>

      <div class="sec-title" style="margin-top:20px">Reparaciones Abiertas</div>
      <div id="unitReparaciones"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- SHEET: Registrar Trabajo -->
<div class="sheet-overlay" id="sheetTrabajo">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🔧 Trabajo Realizado</div>

    <label>Unidad</label>
    <select id="tUnidad"></select>

    <label>Tipo de trabajo</label>
    <select id="tTipo">
      <option value="correctivo">Correctivo (falla)</option>
      <option value="preventivo">Preventivo (mantenimiento)</option>
      <option value="electrico">Eléctrico</option>
      <option value="carroceria">Carrocería / Hojalatería</option>
      <option value="suspension">Suspensión</option>
      <option value="frenos">Frenos</option>
      <option value="motor">Motor</option>
      <option value="transmision">Transmisión</option>
      <option value="otro">Otro</option>
    </select>

    <label>Descripción del trabajo</label>
    <textarea id="tDesc" rows="3" placeholder="Describe detalladamente el trabajo realizado..."></textarea>

    <label>Km en odómetro al recibir</label>
    <input type="number" id="tKm" placeholder="185000" inputmode="numeric" />

    <label>Partes / Refacciones usadas</label>
    <div class="partes-list" id="partesList"></div>
    <button class="add-parte-btn" onclick="addParte()">+ Agregar refacción</button>

    <div class="form-row">
      <div>
        <label>Mano de obra ($)</label>
        <input type="number" id="tMO" placeholder="0" inputmode="decimal" oninput="calcTotalTrabajo()" />
      </div>
      <div>
        <label>Costo partes ($)</label>
        <input type="number" id="tPartesCosto" placeholder="0" inputmode="decimal" oninput="calcTotalTrabajo()" />
      </div>
    </div>

    <div class="total-preview" id="totalPreview" style="display:none"></div>

    <label>Reparación relacionada (opcional)</label>
    <select id="tReparacion"><option value="">Ninguna / Servicio general</option></select>

    <label>Observaciones / Recomendaciones al cliente</label>
    <textarea id="tObs" rows="2" placeholder="Recomendaciones, próximo servicio, advertencias..."></textarea>

    <button class="btn-submit" onclick="saveTrabajo()">Guardar Trabajo</button>
    <button class="btn-cancel" onclick="closeSheet('sheetTrabajo')">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<script>
const SUPABASE_URL = 'https://wkgqidbmbgxnppftelgh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Fo8kOKBDHT2ehXZlVLGcVw_cl7EVA4R';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MECANICO_PIN = '2024';
let selectedUnit = null;
let pinVal = '';

// ── LOGIN ──────────────────────────────────────
function p(d) {
  if (d === 'del') { pinVal = pinVal.slice(0,-1); updateDots(); return; }
  if (pinVal.length >= 4) return;
  pinVal += d;
  updateDots();
  if (pinVal.length === 4) setTimeout(checkPin, 200);
}

function updateDots() {
  document.querySelectorAll('.pin-dot').forEach((dot,i) => dot.classList.toggle('filled', i < pinVal.length));
}

async function checkPin() {
  const { data } = await sb.from('operadores').select('*').eq('pin', pinVal).eq('rol','mecanico');
  if (pinVal === MECANICO_PIN || (data && data.length)) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    loadUnidades();
  } else {
    document.getElementById('pinErr').style.display = 'block';
    pinVal = '';
    updateDots();
  }
}

// ── APP ────────────────────────────────────────
async function loadUnidades() {
  const { data } = await sb.from('unidades').select('*').order('alias');
  const el = document.getElementById('unitSelector');
  if (!data?.length) { el.innerHTML = '<div class="empty">Sin unidades</div>'; return; }

  el.innerHTML = data.map(u => `
    <button class="unit-btn" onclick="selectUnit(${JSON.stringify(u).replace(/"/g,'&quot;')}, this)">
      <div class="unit-icon">🛻</div>
      <div>
        <div class="unit-name">${u.alias || u.modelo} — ${u.marca} ${u.anio||''}</div>
        <div class="unit-plates">${u.placas}</div>
        <div class="unit-km">${u.km_actual?.toLocaleString()||0} km · ${estadoLabel(u.estado)}</div>
      </div>
    </button>`).join('');

  // Populate unit select in sheet
  document.getElementById('tUnidad').innerHTML = data.map(u =>
    `<option value="${u.id}">${u.alias||u.modelo} (${u.placas})</option>`).join('');
}

function estadoLabel(e) {
  return { operativa:'🟢 Operativa', en_taller:'🔧 En taller', fuera_servicio:'🔴 Fuera servicio', mantenimiento:'🟡 Mantenimiento' }[e] || e;
}

async function selectUnit(unit, btn) {
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedUnit = unit;

  // Set default in sheet
  document.getElementById('tUnidad').value = unit.id;

  document.getElementById('unitDetail').style.display = 'block';
  document.getElementById('unitHistory').innerHTML = '<div class="spinner"></div>';
  document.getElementById('unitDanos').innerHTML = '<div class="spinner"></div>';
  document.getElementById('unitReparaciones').innerHTML = '<div class="spinner"></div>';

  // Scroll to detail
  document.getElementById('unitDetail').scrollIntoView({ behavior: 'smooth' });

  await Promise.all([loadUnitHistory(unit.id), loadUnitDanos(unit.id), loadUnitReparaciones(unit.id)]);
}

async function loadUnitHistory(uid) {
  const { data } = await sb.from('trabajos_mecanico')
    .select('*').eq('unidad_id', uid).order('fecha', { ascending: false }).limit(10);
  const el = document.getElementById('unitHistory');
  if (!data?.length) { el.innerHTML = '<div class="empty">Sin historial de trabajos</div>'; return; }
  el.innerHTML = data.map(t => `
    <div class="hist-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="hist-title">🔧 ${tipoLabel(t.tipo)}</div>
        <span class="chip chip-b">${fmtDate(t.fecha)}</span>
      </div>
      <div class="hist-meta">${t.descripcion}</div>
      ${t.partes_usadas?.length ? `<div class="hist-items">${t.partes_usadas.map(p=>`<div class="hist-item">🔩 ${p}</div>`).join('')}</div>` : ''}
      ${t.costo_total ? `<div style="margin-top:8px;font-size:13px;color:var(--muted)">Total: <strong style="color:var(--accent)">$${Number(t.costo_total).toLocaleString()}</strong></div>` : ''}
      ${t.observaciones ? `<div style="margin-top:6px;font-size:12px;color:var(--muted);font-style:italic">"${t.observaciones}"</div>` : ''}
    </div>`).join('');
}

async function loadUnitDanos(uid) {
  const { data } = await sb.from('danos').select('*').eq('unidad_id', uid).neq('estado','reparado').order('fecha', { ascending: false });
  const el = document.getElementById('unitDanos');
  if (!data?.length) { el.innerHTML = '<div class="empty">✅ Sin daños pendientes</div>'; return; }
  el.innerHTML = data.map(d => `
    <div class="svc-section">
      <div class="svc-header">
        <div>
          <div style="font-weight:700;font-size:14px">${d.zona}</div>
          <div style="font-size:12px;color:var(--muted)">${fmtDate(d.fecha)}</div>
        </div>
        <span class="chip ${d.severidad==='mayor'?'chip-r':d.severidad==='moderado'?'chip-a':'chip-g'}">${d.severidad}</span>
      </div>
      <div class="svc-body">
        <div style="font-size:13px;margin-bottom:8px">${d.descripcion||'—'}</div>
        ${d.fotos?.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${d.fotos.map(f=>`<img src="${f}" onclick="enlargePhoto('${f}')" style="width:70px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer" />`).join('')}</div>` : ''}
      </div>
    </div>`).join('');
}

async function loadUnitReparaciones(uid) {
  const { data } = await sb.from('reparaciones').select('*').eq('unidad_id', uid).eq('estado','en_proceso');
  const el = document.getElementById('unitReparaciones');
  const repSel = document.getElementById('tReparacion');

  if (!data?.length) {
    el.innerHTML = '<div class="empty">Sin reparaciones abiertas</div>';
    repSel.innerHTML = '<option value="">Ninguna / Servicio general</option>';
    return;
  }

  el.innerHTML = data.map(r => `
    <div class="svc-section">
      <div class="svc-header">
        <div>
          <div style="font-weight:700;font-size:14px">${r.motivo||'Reparación'}</div>
          <div style="font-size:12px;color:var(--muted)">Entrada: ${fmtDate(r.fecha_entrada)}</div>
        </div>
        <span class="chip chip-r">Abierta</span>
      </div>
      <div class="svc-body">
        ${r.trabajos_pendientes?.map(t=>`<div style="font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)">🔩 ${t}</div>`).join('')||''}
      </div>
    </div>`).join('');

  repSel.innerHTML = '<option value="">Ninguna / Servicio general</option>' +
    data.map(r => `<option value="${r.id}">${r.motivo||'Reparación'} (${fmtDate(r.fecha_entrada)})</option>`).join('');
}

// ── PARTES ─────────────────────────────────────
function addParte() {
  const list = document.getElementById('partesList');
  const row = document.createElement('div');
  row.className = 'parte-row';
  row.innerHTML = `<input type="text" placeholder="Ej: Balatas delanteras" style="margin:0" /><button class="rm-btn" onclick="this.parentElement.remove();calcTotalTrabajo()">✕</button>`;
  list.appendChild(row);
}

function getPartes() {
  return Array.from(document.querySelectorAll('#partesList .parte-row input'))
    .map(i => i.value.trim()).filter(Boolean);
}

function calcTotalTrabajo() {
  const mo = parseFloat(document.getElementById('tMO').value) || 0;
  const pc = parseFloat(document.getElementById('tPartesCosto').value) || 0;
  const total = mo + pc;
  const el = document.getElementById('totalPreview');
  if (total > 0) {
    el.style.display = 'block';
    el.textContent = `TOTAL: $${total.toLocaleString('es-MX', {minimumFractionDigits:2})} MXN`;
  } else { el.style.display = 'none'; }
}

// ── SAVE ───────────────────────────────────────
async function saveTrabajo() {
  const uid = document.getElementById('tUnidad').value;
  const desc = document.getElementById('tDesc').value.trim();
  if (!uid || !desc) { toast('Describe el trabajo realizado', true); return; }

  const mo = parseFloat(document.getElementById('tMO').value) || 0;
  const pc = parseFloat(document.getElementById('tPartesCosto').value) || 0;

  // Get mechanic id
  const { data: mec } = await sb.from('operadores').select('id').eq('pin', MECANICO_PIN).single();

  await sb.from('trabajos_mecanico').insert({
    unidad_id: uid,
    reparacion_id: document.getElementById('tReparacion').value || null,
    mecanico_id: mec?.id || null,
    fecha: new Date().toISOString().split('T')[0],
    descripcion: desc,
    tipo: document.getElementById('tTipo').value,
    partes_usadas: getPartes(),
    costo_mano_obra: mo,
    costo_partes: pc,
    costo_total: mo + pc,
    km_en_servicio: parseInt(document.getElementById('tKm').value) || null,
    observaciones: document.getElementById('tObs').value.trim()
  });

  closeSheet('sheetTrabajo');
  toast('✅ Trabajo registrado');
  if (selectedUnit) await loadUnitHistory(selectedUnit.id);

  // Clear form
  document.getElementById('tDesc').value = '';
  document.getElementById('tKm').value = '';
  document.getElementById('tMO').value = '';
  document.getElementById('tPartesCosto').value = '';
  document.getElementById('tObs').value = '';
  document.getElementById('partesList').innerHTML = '';
  document.getElementById('totalPreview').style.display = 'none';
}

// ── HELPERS ────────────────────────────────────
function openSheet(id) { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.sheet-overlay').forEach(el => {
  el.addEventListener('click', e => { if(e.target===el) el.classList.remove('open'); });
});

function tipoLabel(t) {
  return { correctivo:'Correctivo', preventivo:'Preventivo', electrico:'Eléctrico', carroceria:'Carrocería', suspension:'Suspensión', frenos:'Frenos', motor:'Motor', transmision:'Transmisión', otro:'Otro' }[t] || t;
}
function fmtDate(d) {
  if (!d) return '—';
  const s = d.split('T')[0].split('-');
  return `${s[2]}/${s[1]}/${s[0]}`;
}
function enlargePhoto(src) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer';
  div.onclick = () => div.remove();
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:92vw;max-height:92vh;border-radius:10px;border:2px solid var(--accent)';
  div.appendChild(img);
  document.body.appendChild(div);
}
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderLeftColor = isErr ? 'var(--red)' : 'var(--green)';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 3500);
}
</script>
</body>
